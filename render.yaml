# render.yaml — Free Render.com deployment
# Deploys the FastAPI REST API as a background worker.

services:

  # ── FastAPI REST API ─────────────────────────────────────────────────────
  - type: web
    name: repoalpha-api
    env: python
    region: oregon
    plan: free                        # Render free tier — spins down after 15min idle
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false                   # set in Render dashboard
      - key: SUPABASE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── Pipeline Worker (cron-style) ─────────────────────────────────────────
  # Runs the full pipeline every hour.
  # On Render free tier: use a cron job instead of a persistent worker.
  - type: cron
    name: repoalpha-pipeline
    env: python
    region: oregon
    schedule: "5 * * * *"            # every hour at :05 past
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: BRIGHTDATA_API_TOKEN
        sync: false
      - key: BRIGHTDATA_CUSTOMER_ID
        sync: false
      - key: BRIGHTDATA_ZONE
        sync: false
      - key: BRIGHTDATA_ZONE_PASSWORD
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ALERT_EMAIL_TO
        sync: false
